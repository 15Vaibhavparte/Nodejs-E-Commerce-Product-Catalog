version: '3.8'
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    volumes:
      # Option A: Map the whole config folder (Safest)
      - ./config:/app/config
    # This ensures the app restarts if the server reboots or the app crashes
    restart: always